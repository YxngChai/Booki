<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/c8cb44d56f.js"
      crossorigin="anonymous"></script>
    <link
      rel="icon"
      type="image/png"
      href="/assets/favicon/favicon-96x96.png"
      sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/assets/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/assets/favicon/favicon.ico" />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/assets/favicon/apple-touch-icon.png" />
    <link rel="manifest" href="/assets/favicon/site.webmanifest" />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/header.css" />
    <link rel="stylesheet" href="css/main.css" />
    <link rel="stylesheet" href="css/footer.css" />
    <title>Booki</title>
  </head>
  <body>
    <header class="header">
      <a href="/">
        <img
          class="header__logo"
          src="assets/logo/Logo.svg"
          alt="Logo du site" />
      </a>
      <nav class="nav">
        <ul class="nav__links">
          <li class="nav__item">
            <a class="nav__link" href="#">Hébergements</a>
          </li>
          <li class="nav__item">
            <a class="nav__link" href="#">Activités</a>
          </li>
        </ul>
      </nav>
    </header>
    <main>
      <section class="hero">
        <h1 class="hero__title">
          Trouvez votre hébergement pour des vacances de rêve
        </h1>
        <p class="hero__slogan">En plein centre de ville ou en pleine nature</p>
        <form class="hero__search-form" method="">
          <label class="hero__search-icon-label" for="location"
            ><i class="fa-solid fa-location-dot"></i
          ></label>
          <input
            class="hero__search-input"
            type="text"
            name="location"
            id="location"
            placeholder="Marseille, France" />
          <button
            class="hero__search-btn"
            type="submit"
            name="submit"
            value="search">
            <span class="hero__search-bt-text">Rechercher</span>
            <span class="hero__search-bt-icon"
              ><i class="fa fa-search"></i
            ></span>
          </button>
        </form>
        <div class="hero__filter">
          <p class="hero__filter-label">Filtres</p>
          <button class="hero__filter-btn">
            <i class="fa-solid fa-money-bill-wave"></i>
            <span class="hero__filter-btn-text">Économique</span>
          </button>
          <button class="hero__filter-btn">
            <i class="fa-solid fa-person"></i>
            <span class="hero__filter-btn-text">Familial</span>
          </button>
          <button class="hero__filter-btn">
            <i class="fa-solid fa-heart"></i>
            <span class="hero__filter-btn-text">Romantique</span>
          </button>
          <button class="hero__filter-btn">
            <i class="fa-solid fa-dog"></i>
            <span class="hero__filter-btn-text">Animaux autorisés</span>
          </button>
        </div>
        <div class="hero__info">
          <div class="hero__info-icon">
            <i class="fa-solid fa-info fa-sm"></i>
          </div>
          <p class="hero__info-text">
            Plus de 500 logements sont disponibles dans cette ville
          </p>
        </div>
      </section>
    </main>
    <footer></footer>
  </body>
</html>
